services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lan_exam
      POSTGRES_PASSWORD: lan_exam_dev
      POSTGRES_DB: lan_exam
    # Host 5434 avoids Windows reserved 5432 and other projects on 5433 (e.g. mood-monitor).
    ports:
      - '127.0.0.1:${DB_HOST_PORT:-5434}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lan_exam -d lan_exam']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    image: lan-exam:${LAN_EXAM_IMAGE_TAG:-latest}
    ports:
      - '${WEB_HOST_PORT:-5180}:5180'
    environment:
      ADMIN_AUTH_MODE: disabled
      ADMIN_API_LOOPBACK_ONLY: 'true'
      LOCAL_ADMIN_USERNAME: local_exam_admin
      WEB_PORT: '5180'
      LISTEN_HOST: '0.0.0.0'
      DATABASE_URL: postgresql://lan_exam:lan_exam_dev@db:5432/lan_exam
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-min-16-chars}
      DATA_DIR: /app/data
    volumes:
      - uploads_data:/app/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
